<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480" fill="none">
  <style>
    .bg { fill: #0d1117; }
    .bar { fill: #161b22; }
    .border { stroke: #1a1f2b; stroke-width: 1; fill: none; }
    .dot-r { fill: #ff5f57; }
    .dot-y { fill: #febc2e; }
    .dot-g { fill: #28c840; }
    .title { fill: #4b5563; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; }
    .prompt { fill: #7dd3fc; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .cmd { fill: #34d399; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .ascii { fill: #34d399; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .heading { fill: #fbbf24; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; font-weight: 700; }
    .text { fill: #c5cdd9; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .dim { fill: #4b5563; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .link { fill: #60a5fa; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .cursor { fill: #34d399; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .blink { animation: blink 1.2s step-end infinite; }
  </style>

  <!-- Window -->
  <rect class="bg" x="0" y="0" width="800" height="480" rx="12" />
  <rect class="border" x="0.5" y="0.5" width="799" height="479" rx="12" />

  <!-- Title bar -->
  <rect class="bar" x="1" y="1" width="798" height="40" rx="12" />
  <rect class="bg" x="1" y="30" width="798" height="12" />
  <line x1="1" y1="41" x2="799" y2="41" stroke="#1a1f2b" stroke-width="1" />
  <circle class="dot-r" cx="24" cy="21" r="6" />
  <circle class="dot-y" cx="44" cy="21" r="6" />
  <circle class="dot-g" cx="64" cy="21" r="6" />
  <text class="title" x="400" y="25" text-anchor="middle">jaider@github &#8212; zsh</text>

  <!-- Terminal content -->
  <g transform="translate(24, 62)">
    <!-- $ help -->
    <text class="prompt" y="0">jaider@github:~$</text>
    <text class="cmd" x="152" y="0">help</text>

    <!-- ASCII art -->
    <text class="ascii" y="28" xml:space="preserve">     __      _     __           </text>
    <text class="ascii" y="45" xml:space="preserve">    / /___ _(_)___/ /__  ____   </text>
    <text class="ascii" y="62" xml:space="preserve">   / / __ '/ / __  / _ \/ __/   </text>
    <text class="ascii" y="79" xml:space="preserve">  / / /_/ / / /_/ /  __/ /      </text>
    <text class="ascii" y="96" xml:space="preserve"> /_/\__,_/_/\__,_/\___/_/       </text>

    <!-- Heading -->
    <text class="heading" y="130">Available commands:</text>

    <!-- Commands list -->
    <text class="text" y="156" xml:space="preserve">  whoami       </text><text class="dim" x="140" y="156">Who am I?</text>
    <text class="text" y="174" xml:space="preserve">  skills       </text><text class="dim" x="140" y="174">Languages, frameworks &amp; tools</text>
    <text class="text" y="192" xml:space="preserve">  experience   </text><text class="dim" x="140" y="192">Work history</text>
    <text class="text" y="210" xml:space="preserve">  projects     </text><text class="dim" x="140" y="210">Selected projects</text>
    <text class="text" y="228" xml:space="preserve">  repos        </text><text class="dim" x="140" y="228">GitHub repositories</text>
    <text class="text" y="246" xml:space="preserve">  education    </text><text class="dim" x="140" y="246">Academic background</text>
    <text class="text" y="264" xml:space="preserve">  contact      </text><text class="dim" x="140" y="264">Get in touch</text>
    <text class="text" y="282" xml:space="preserve">  tools        </text><text class="dim" x="140" y="282">Dev environment &amp; workflow</text>
    <text class="text" y="300" xml:space="preserve">  languages    </text><text class="dim" x="140" y="300">Spoken languages</text>
    <text class="text" y="318" xml:space="preserve">  interactive  </text><text class="dim" x="140" y="318">Launch the live terminal</text>
    <text class="text" y="336" xml:space="preserve">  clear        </text><text class="dim" x="140" y="336">Clear the terminal</text>
    <text class="text" y="354" xml:space="preserve">  help         </text><text class="dim" x="140" y="354">Show this message</text>

    <!-- Prompt with blinking cursor -->
    <text class="prompt" y="390">jaider@github:~$</text>
    <text class="cursor blink" x="152" y="390">&#9608;</text>
  </g>
</svg>
