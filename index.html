<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg:          #000000;
    --surface:     #000000;
    --header-bg:   #141414;
    --tab-bg:      #1c1c1c;
    --tab-active:  #1c1c1c;
    --border:      #1a1a1a;
    --border-light:#2a2a2a;
    --text:        #dddddd;
    --dim:         #777777;
    --prompt:      #7dd3fc;
    --accent:      #01d68a;
    --warn:        #fbbf24;
    --error:       #f87171;
    --link:        #60a5fa;
    --icon:        #999999;
    --icon-bright: #ffffff;
    --block-bg:    #0a0a0a;
    --block-border:#1e1e1e;
    --input-bg:    #0d0d0d;
  }

  html, body {
    height: 100%;
    background: #0a0a0a;
    color: var(--text);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 13px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 100vh;
    background: #0a0a0a;
  }

  .terminal {
    width: 100%;
    max-width: 900px;
    border-radius: 12px;
    border: 1px solid #222222;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.02),
      0 25px 80px -12px rgba(0,0,0,0.7);
  }

  /* ── Warp title bar ── */
  .title-bar {
    display: flex;
    align-items: center;
    height: 44px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    user-select: none;
    position: relative;
  }

  /* Sidebar toggle */
  .sidebar-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .sidebar-toggle svg {
    width: 16px;
    height: 16px;
    stroke: var(--icon);
    fill: none;
    stroke-width: 1.5;
  }
  .sidebar-toggle:hover svg { stroke: var(--icon-bright); }

  /* Tab area */
  .tab-area {
    display: flex;
    align-items: stretch;
    height: 100%;
    flex: 1;
    min-width: 0;
  }

  .tab {
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 100%;
    background: var(--tab-active);
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    border-right: 1px solid var(--border);
    cursor: default;
    gap: 8px;
    min-width: 160px;
  }
  .tab .tab-icon {
    width: 14px;
    height: 14px;
    stroke: var(--icon);
    fill: none;
    stroke-width: 1.5;
    flex-shrink: 0;
  }
  .tab .tab-title {
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tab-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 8px;
    height: 100%;
  }
  .tab-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 4px;
    cursor: pointer;
  }
  .tab-btn:hover { background: rgba(255,255,255,0.06); }
  .tab-btn svg {
    width: 14px;
    height: 14px;
    stroke: var(--icon);
    fill: none;
    stroke-width: 1.8;
  }
  .tab-btn:hover svg { stroke: var(--icon-bright); }

  /* Right controls (spacer + window buttons) */
  .title-right {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-left: auto;
    padding-right: 8px;
  }
  .title-right .spacer-stretch { flex: 1; }

  .wctrl {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 4px;
    cursor: pointer;
  }
  .wctrl:hover { background: rgba(255,255,255,0.08); }
  .wctrl.close:hover { background: #c42b1c; }
  .wctrl svg {
    width: 14px;
    height: 14px;
    stroke: var(--icon-bright);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
  }

  /* ── terminal body ── */
  .terminal-body {
    height: 520px;
    overflow-y: auto;
    padding: 16px 20px;
    padding-bottom: 8px;
    background: var(--surface);
    scroll-behavior: smooth;
  }

  .terminal-body::-webkit-scrollbar { width: 6px; }
  .terminal-body::-webkit-scrollbar-track { background: transparent; }
  .terminal-body::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
  }
  .terminal-body::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.18);
  }

  /* ── Warp command blocks ── */
  .command-block {
    background: var(--block-bg);
    border: 1px solid var(--block-border);
    border-left: 2px solid transparent;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  .command-block:hover {
    border-color: #2a2a2a;
    border-left-color: var(--accent);
  }
  .command-block .block-prompt {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 0;
  }
  .command-block .block-prompt .prompt-prefix {
    color: var(--prompt);
    flex-shrink: 0;
    font-size: 12px;
    opacity: 0.7;
  }
  .command-block .block-prompt .cmd-text {
    color: var(--accent);
    font-weight: 700;
  }
  .command-block .block-output {
    padding-left: 0;
  }

  /* Boot / welcome block */
  .welcome-block {
    padding: 12px 0;
    margin-bottom: 4px;
  }

  /* ── output lines ── */
  .line { white-space: pre-wrap; word-break: break-word; }
  .line.prompt-line {
    display: flex;
    align-items: center;
    margin-top: 4px;
  }
  .line .prompt-prefix {
    color: var(--prompt);
    flex-shrink: 0;
    margin-right: 0;
  }
  .line .cmd-text { color: var(--accent); }
  .line.output { color: var(--text); margin-left: 0; }
  .line.output.dim { color: var(--dim); }
  .line.ascii { color: var(--accent); }
  .line.heading { color: var(--warn); font-weight: 700; }
  .line.link-line { color: var(--link); }
  .line.link-line a { color: var(--link); text-decoration: none; }
  .line.link-line a:hover { text-decoration: underline; }
  .line.error { color: var(--error); }
  .line.bar { color: var(--accent); }

  .spacer { height: 8px; }

  /* ── Warp bottom input bar ── */
  .input-bar {
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .input-bar .path-row {
    display: flex;
    align-items: center;
    padding: 6px 14px;
    gap: 6px;
  }
  .input-bar .path-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    background: var(--header-bg);
    border: 1px solid var(--border-light);
    border-radius: 5px;
    font-size: 12px;
    color: #bbbbbb;
    cursor: default;
  }
  .input-bar .path-pill svg {
    width: 14px;
    height: 14px;
    stroke: var(--icon);
    fill: none;
    stroke-width: 1.3;
    stroke-linejoin: round;
  }

  .input-bar .input-area {
    display: flex;
    align-items: center;
    padding: 0 16px 12px 16px;
    gap: 8px;
  }

  .input-bar .prompt-symbol {
    color: var(--accent);
    font-weight: 700;
    font-size: 14px;
    flex-shrink: 0;
    opacity: 0.7;
  }

  #input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font: inherit;
    font-size: 13px;
    caret-color: var(--accent);
    padding: 0;
  }
  #input::placeholder {
    color: #444444;
    font-style: normal;
  }

  /* ── mobile ── */
  @media (max-width: 640px) {
    body { padding: 8px; }
    .terminal { max-width: 100%; border-radius: 8px; }
    .terminal-body { height: calc(100vh - 140px); font-size: 12px; }
    .tab .tab-title { font-size: 11px; }
    .title-right .wctrl { width: 28px; height: 28px; }
  }

  /* ── typing animation ── */
  .typing-cursor::after {
    content: '█';
    animation: blink 1s step-end infinite;
    color: var(--accent);
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── fade-in for blocks ── */
  .command-block {
    animation: blockIn 0.2s ease-out;
  }
  @keyframes blockIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

      '            ▒▒▓▓▒▒▒▒▒▒▒▄  ▄░░░▒▒▒▒▒▒░▒▒▒▒▒▒▒▒▒▒▓▓▒▓▓▒▒▒░▄   ',
      '            ▓▒▒▓▒▒▒▒▒▒▒░▒▒▒▒▒▒▒▒▒▒▒▓▒░░▒▒▒░░░░▓▒▒▒▒▒▒▒░░░▄  ',
      '            ▒▒▓▓▒▓▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒░░░░░░░░░░▒▒▒▒▒▒▒▒▒░░▒  ',
      '            ▒▒▓▓▓▒▒▓▒▓▒▒▒▒▒▒▒▒▒▒▒▒▒▒░░░░░░░░░░░▒▒▒▒▒▒▒▒▒░░▒ ',
      '             ▀▒▒▒▒▒▒▓▒▒▒▒▒▓▒▒▒▒▒▒▒▒░░▒▒░░░░░░░░▒▒▒▒▓▒▒▒▒▒░░▒',
    ];
    // Info lines (same count as art, empty string = blank right side)
    const info = [
      { label: 'jaider@github', value: '', bold: true },
      { label: '──────────────────────', value: '', sep: true },
      { label: 'OS', value: 'Linux, Windows, MacOS (?)' },
      { label: 'Host', value: 'Inalambria Internacional' },

      { label: '', value: '' },
      { label: 'Interests', value: 'Architecture, UX, AI Workflows' },
      { label: 'Hardware', value: 'Messing with ESP32s & STM32s' },
      { label: '', value: '' },
      { label: 'Hobbies', value: 'Gaming, art, learning new things' },
      { label: '', value: '' },
      { label: 'Spoken', value: 'Spanish (native), English (B2)' },
      { label: '', value: '' },
      { label: 'Email', value: 'correodejaider@gmail.com', link: true },
      { label: 'LinkedIn', value: 'linkedin.com/in/jaider-vd', link: true },
      { label: 'GitHub', value: 'github.com/GH-Jaider', link: true },
    ];
    const lines = [];
    for (let i = 0; i < art.length; i++) {
      const a = art[i];
      const inf = info[i] || { label: '', value: '' };
      if (inf.bold) {
        lines.push({ type: 'fastfetch', art: a, infoHtml: `<span style="color:var(--accent);font-weight:700">${inf.label}</span>` });
      } else if (inf.sep) {
        lines.push({ type: 'fastfetch', art: a, infoHtml: `<span style="color:var(--dim)">${inf.label}</span>` });
      } else if (inf.label || inf.value) {
        let right = '';
        if (inf.label) right += `<span style="color:var(--accent);font-weight:700">${inf.label}</span><span style="color:var(--dim)">: </span>`;
        if (inf.link) {
          const url = inf.value.startsWith('http') ? inf.value : (inf.value.includes('@') ? 'mailto:' + inf.value : 'https://' + inf.value);
          right += `<a href="${url}" target="_blank" rel="noopener" style="color:var(--link);text-decoration:none">${inf.value}</a>`;
        } else if (inf.cont) {
          // Continuation line — indent to align with values above
          right = `<span style="color:var(--text)">${inf.value}</span>`;
        } else {
          right += `<span style="color:var(--text)">${inf.value}</span>`;
        }
        lines.push({ type: 'fastfetch', art: a, infoHtml: right });
      } else {
        lines.push({ type: 'fastfetch', art: a, infoHtml: '' });
      }
    }
    return lines;
  },
};

// ── DOM refs ──
const terminal = document.getElementById('terminal');
const input    = document.getElementById('input');
let isTyping   = false;
const history  = [];
let historyIdx = -1;

// ── helpers ──
function scrollBottom() {
  terminal.scrollTop = terminal.scrollHeight;
}

function createLine(text, className) {
  const div = document.createElement('div');
  div.className = 'line' + (className ? ' ' + className : '');
  div.textContent = text;
  return div;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Warp-style: create a command block with prompt + output
function createBlock(cmd, lines) {
  const block = document.createElement('div');
  block.className = 'command-block';

  // Prompt header
  const promptDiv = document.createElement('div');
  promptDiv.className = 'block-prompt';
  promptDiv.innerHTML = `<span class="prompt-prefix">jaider@github:~$</span>&nbsp;<span class="cmd-text">${escapeHtml(cmd)}</span>`;
  block.appendChild(promptDiv);

  // Output container
  const outputDiv = document.createElement('div');
  outputDiv.className = 'block-output';
  block.appendChild(outputDiv);

  return { block, outputDiv };
}

async function typeLines(lines, cmd) {
  isTyping = true;
  input.disabled = true;

  let container;

  if (cmd) {
    // Create a Warp-style command block
    const { block, outputDiv } = createBlock(cmd, lines);
    terminal.appendChild(block);
    container = outputDiv;
  } else {
    // Boot sequence — wrap in a welcome block
    const welcome = document.createElement('div');
    welcome.className = 'welcome-block';
    terminal.appendChild(welcome);
    container = welcome;
  }

  for (const line of lines) {
    let cls = 'output';
    if (line.type === 'heading')  cls = 'output heading';
    else if (line.type === 'dim') cls = 'output dim';
    else if (line.type === 'ascii') cls = 'output ascii';
    else if (line.type === 'link') cls = 'output link-line';
    else if (line.type === 'error') cls = 'output error';
    else if (line.type === 'bar') cls = 'output bar';

    const el = createLine('', cls);
    container.appendChild(el);

    const text = line.text || '';

    if (line.html) {
      el.innerHTML = line.html;
      scrollBottom();
      await sleep(20);
      continue;
    }

    // fastfetch lines: ASCII art (left) + info (right), rendered as HTML
    if (line.type === 'fastfetch') {
      const artHtml = `<span style="color:var(--accent)">${escapeHtml(line.art)}</span>`;
      const gap = '  ';
      el.innerHTML = artHtml + gap + (line.infoHtml || '');
      el.className = 'line output';
      el.style.whiteSpace = 'pre';
      scrollBottom();
      await sleep(30);
      continue;
    }

    // Fast "type" effect — reveal char by char for short lines, batch for long
    if (text.length <= 60) {
      for (let i = 0; i < text.length; i++) {
        el.textContent += text[i];
        scrollBottom();
        await sleep(8);
      }
    } else {
      // Batch in chunks
      const chunk = 4;
      for (let i = 0; i < text.length; i += chunk) {
        el.textContent += text.slice(i, i + chunk);
        scrollBottom();
        await sleep(6);
      }
    }

    // Make URLs clickable after typing completes
    if (line.type === 'link') {
      const raw = el.textContent;
      const urlMatch = raw.match(/(https?:\/\/[^\s]+)/);
      if (urlMatch) {
        const url = urlMatch[1];
        const before = raw.slice(0, urlMatch.index);
        const after = raw.slice(urlMatch.index + url.length);
        el.innerHTML = escapeHtml(before) + `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a>` + escapeHtml(after);
      }
    }

    await sleep(20);
  }

  isTyping = false;
  input.disabled = false;
  input.focus();
  scrollBottom();
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ── command execution ──
function exec(raw) {
  const cmd = raw.trim().toLowerCase();
  if (!cmd) return;

  history.unshift(raw.trim());
  historyIdx = -1;

  if (cmd === 'clear') {
    terminal.innerHTML = '';
    scrollBottom();
    return;
  }

  if (cmd === 'exit') {
    window.location.href = 'https://github.com/GH-Jaider';
    return;
  }

  const handler = COMMANDS[cmd];
  if (!handler && (cmd === 'neofetch')) {
    typeLines(COMMANDS.fastfetch(), raw.trim());
    return;
  }
  if (handler) {
    typeLines(handler(), raw.trim());
  } else {
    typeLines([
      { type: 'error', text: `command not found: ${cmd}` },
      { text: "Type 'help' to see available commands." },
    ], raw.trim());
  }
}

// ── input handling ──
input.addEventListener('keydown', (e) => {
  if (isTyping) { e.preventDefault(); return; }

  if (e.key === 'Enter') {
    const val = input.value;
    input.value = '';
    exec(val);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (history.length && historyIdx < history.length - 1) {
      historyIdx++;
      input.value = history[historyIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx > 0) {
      historyIdx--;
      input.value = history[historyIdx];
    } else {
      historyIdx = -1;
      input.value = '';
    }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    exec('clear');
  }
});

// keep focus on input
document.querySelector('.terminal').addEventListener('click', () => {
  if (!isTyping) input.focus();
});
