<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg:        #0a0e14;
    --surface:   #0d1117;
    --border:    #1a1f2b;
    --text:      #c5cdd9;
    --dim:       #4b5563;
    --prompt:    #7dd3fc;
    --accent:    #34d399;
    --warn:      #fbbf24;
    --error:     #f87171;
    --link:      #60a5fa;
    --bar-bg:    #161b22;
    --bar-dot-r: #ff5f57;
    --bar-dot-y: #febc2e;
    --bar-dot-g: #28c840;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(52,211,153,0.06), transparent),
      var(--bg);
  }

  .terminal {
    width: 100%;
    max-width: 780px;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 24px 80px -12px rgba(0,0,0,0.6);
  }

  .title-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: var(--bar-bg);
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .title-bar .dots { display: flex; gap: 7px; }
  .title-bar .dot { width: 12px; height: 12px; border-radius: 50%; }
  .title-bar .dot.r { background: var(--bar-dot-r); }
  .title-bar .dot.y { background: var(--bar-dot-y); }
  .title-bar .dot.g { background: var(--bar-dot-g); }
  .title-bar .title {
    flex: 1;
    text-align: center;
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.5px;
  }

  .terminal-body {
    height: 520px;
    overflow-y: auto;
    padding: 20px;
    background: var(--surface);
    scroll-behavior: smooth;
  }

  .terminal-body::-webkit-scrollbar { width: 6px; }
  .terminal-body::-webkit-scrollbar-track { background: transparent; }
  .terminal-body::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .line { white-space: pre-wrap; word-break: break-word; }
  .line.prompt-line {
    display: flex;
    align-items: center;
    margin-top: 4px;
  }
  .line .prompt-prefix {
    color: var(--prompt);
    flex-shrink: 0;
    margin-right: 0;
  }
  .line .cmd-text { color: var(--accent); }
  .line.output { color: var(--text); margin-left: 0; }
  .line.output.dim { color: var(--dim); }
  .line.ascii { color: var(--accent); }
  .line.heading { color: var(--warn); font-weight: 700; }
  .line.link-line { color: var(--link); }
  .line.link-line a { color: var(--link); text-decoration: none; }
  .line.link-line a:hover { text-decoration: underline; }
  .line.error { color: var(--error); }
  .line.bar { color: var(--accent); }

  .spacer { height: 12px; }

  .input-row {
    display: flex;
    align-items: center;
    margin-top: 4px;
  }
  .input-row .prompt-prefix {
    color: var(--prompt);
    flex-shrink: 0;
  }
  #input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--accent);
    font: inherit;
    caret-color: var(--accent);
    padding: 0;
  }

  @media (max-width: 640px) {
    body { padding: 8px; }
    .terminal-body { height: calc(100vh - 100px); font-size: 12px; }
  }

  @keyframes blink { 50% { opacity: 0; } }
</style>

const terminal = document.getElementById('terminal');
const input    = document.getElementById('input');
let inputRow   = input.parentElement;
let isTyping   = false;
const history  = [];
let historyIdx = -1;

function scrollBottom() {
  terminal.scrollTop = terminal.scrollHeight;
}

function createLine(text, className) {
  const div = document.createElement('div');
  div.className = 'line' + (className ? ' ' + className : '');
  div.textContent = text;
  return div;
}

function freezePrompt(cmd) {
  const frozen = document.createElement('div');
  frozen.className = 'line prompt-line';
  frozen.innerHTML = '<span class="prompt-prefix">' + PROMPT + '</span><span class="cmd-text">' + escapeHtml(cmd) + '</span>';
  terminal.insertBefore(frozen, inputRow);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function typeLines(lines) {
  isTyping = true;
  input.disabled = true;

  for (const line of lines) {
    let cls = 'output';
    if (line.type === 'heading')  cls = 'output heading';
    else if (line.type === 'dim') cls = 'output dim';
    else if (line.type === 'ascii') cls = 'output ascii';
    else if (line.type === 'link') cls = 'output link-line';
    else if (line.type === 'error') cls = 'output error';
    else if (line.type === 'bar') cls = 'output bar';

    const el = createLine('', cls);
    terminal.insertBefore(el, inputRow);

    const text = line.text || '';
    if (text.length <= 60) {
      for (let i = 0; i < text.length; i++) {
        el.textContent += text[i];
        scrollBottom();
        await sleep(8);
      }
    } else {
      const chunk = 4;
      for (let i = 0; i < text.length; i += chunk) {
        el.textContent += text.slice(i, i + chunk);
        scrollBottom();
        await sleep(6);
      }
    }

    if (line.type === 'link') {
      const raw = el.textContent;
      const urlMatch = raw.match(/(https?:\/\/[^\s]+)/);
      if (urlMatch) {
        const url = urlMatch[1];
        const before = raw.slice(0, urlMatch.index);
        const after = raw.slice(urlMatch.index + url.length);
        el.innerHTML = escapeHtml(before) + '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">' + escapeHtml(url) + '</a>' + escapeHtml(after);
      }
    }

    await sleep(20);
  }

  const spacer = document.createElement('div');
  spacer.className = 'spacer';
  terminal.insertBefore(spacer, inputRow);

  isTyping = false;
  input.disabled = false;
  input.focus();
  scrollBottom();
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function exec(raw) {
  const cmd = raw.trim().toLowerCase();
  if (!cmd) return;

  history.unshift(raw.trim());
  historyIdx = -1;

  freezePrompt(raw.trim());

  if (cmd === 'clear') {
    while (terminal.firstChild !== inputRow) {
      terminal.removeChild(terminal.firstChild);
    }
    scrollBottom();
    return;
  }

  const handler = COMMANDS[cmd];
  if (handler) {
    typeLines(handler());
  } else {
    typeLines([
      { type: 'error', text: 'command not found: ' + cmd },
      { text: "Type 'help' to see available commands." },
    ]);
  }
}

input.addEventListener('keydown', (e) => {
  if (isTyping) { e.preventDefault(); return; }

  if (e.key === 'Enter') {
    const val = input.value;
    input.value = '';
    exec(val);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (history.length && historyIdx < history.length - 1) {
      historyIdx++;
      input.value = history[historyIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx > 0) {
      historyIdx--;
      input.value = history[historyIdx];
    } else {
      historyIdx = -1;
      input.value = '';
    }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    exec('clear');
  }
});

terminal.addEventListener('click', () => {
  if (!isTyping) input.focus();
});
