<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200" fill="none">
  <style>
    .bg { fill: #0d1117; }
    .heading { fill: #fbbf24; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; font-weight: 700; }
    .text { fill: #c5cdd9; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
  </style>

  <rect class="bg" x="0" y="0" width="800" height="200" rx="8" />

  <g transform="translate(24, 24)">
    <text class="heading" y="0">Dev environment</text>

    <text class="text" y="30" xml:space="preserve">  Editor            VS Code</text>
    <text class="text" y="48" xml:space="preserve">  AI Assistants     OpenCode, GitHub Copilot</text>
    <text class="text" y="66" xml:space="preserve">  Package Mgmt      pnpm, Turborepo</text>
    <text class="text" y="84" xml:space="preserve">  Automation        n8n</text>
    <text class="text" y="102" xml:space="preserve">  API Design        OpenAPI, Fastify</text>
    <text class="text" y="120" xml:space="preserve">  Deployment        GitHub Pages, Vercel</text>
    <text class="text" y="138" xml:space="preserve">  Version Control   Git + GitHub</text>
  </g>
</svg>