<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340" fill="none">
  <style>
    .bg { fill: #0d1117; }
    .bar { fill: #161b22; }
    .border { stroke: #1a1f2b; stroke-width: 1; fill: none; }
    .dot-r { fill: #ff5f57; }
    .dot-y { fill: #febc2e; }
    .dot-g { fill: #28c840; }
    .title { fill: #4b5563; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; }
    .prompt { fill: #7dd3fc; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .cmd { fill: #34d399; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .heading { fill: #fbbf24; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; font-weight: 700; }
    .text { fill: #c5cdd9; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .accent { fill: #34d399; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .link { fill: #60a5fa; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .cursor { fill: #34d399; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .blink { animation: blink 1.2s step-end infinite; }
  </style>

  <!-- Window -->
  <rect class="bg" x="0" y="0" width="800" height="340" rx="12" />
  <rect class="border" x="0.5" y="0.5" width="799" height="339" rx="12" />

  <!-- Title bar -->
  <rect class="bar" x="1" y="1" width="798" height="40" rx="12" />
  <rect class="bg" x="1" y="30" width="798" height="12" />
  <line x1="1" y1="41" x2="799" y2="41" stroke="#1a1f2b" stroke-width="1" />
  <circle class="dot-r" cx="24" cy="21" r="6" />
  <circle class="dot-y" cx="44" cy="21" r="6" />
  <circle class="dot-g" cx="64" cy="21" r="6" />
  <text class="title" x="400" y="25" text-anchor="middle">jaider@github &#8212; zsh</text>

  <!-- Terminal content -->
  <g transform="translate(24, 62)">
    <text class="prompt" y="0">jaider@github:~$</text>
    <text class="cmd" x="152" y="0">repos</text>

    <text class="heading" y="34">Public repositories</text>

    <text class="accent" y="64" xml:space="preserve">  splitify                 </text><text class="text" x="260" y="64">AI-powered commit grouping for VS Code</text>
    <text class="accent" y="82" xml:space="preserve">  VS-Karel                 </text><text class="text" x="260" y="82">VS Code extension for Karel the Robot</text>
    <text class="accent" y="100" xml:space="preserve">  sesamo-whatsapp-bot      </text><text class="text" x="260" y="100">WhatsApp bot</text>
    <text class="accent" y="118" xml:space="preserve">  opencode-agent-flowkit   </text><text class="text" x="260" y="118">CLI tool for OpenCode agent workflows</text>
    <text class="accent" y="136" xml:space="preserve">  n8n-nodes-inalambria     </text><text class="text" x="260" y="136">n8n node for SMS via Inalambria</text>
    <text class="accent" y="154" xml:space="preserve">  Collisions-Simulator     </text><text class="text" x="260" y="154">Elastic collision simulator (Python)</text>
    <text class="accent" y="172" xml:space="preserve">  Py.Karel                 </text><text class="text" x="260" y="172">Karel language interpreter (Python)</text>

    <text class="link" y="206" xml:space="preserve">  Browse all &#8594; https://github.com/GH-Jaider?tab=repositories</text>

    <!-- Trailing prompt -->
    <text class="prompt" y="242">jaider@github:~$</text>
    <text class="cursor blink" x="152" y="242">&#9608;</text>
  </g>
</svg>