<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240" fill="none">
  <style>
    .bg { fill: #0d1117; }
    .heading { fill: #fbbf24; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; font-weight: 700; }
    .text { fill: #c5cdd9; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .accent { fill: #34d399; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .link { fill: #60a5fa; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
  </style>

  <rect class="bg" x="0" y="0" width="800" height="240" rx="8" />

  <g transform="translate(24, 24)">
    <text class="heading" y="0">Public repositories</text>

    <text class="accent" y="30" xml:space="preserve">  splitify                 </text><text class="text" x="260" y="30">AI-powered commit grouping for VS Code</text>
    <text class="accent" y="48" xml:space="preserve">  VS-Karel                 </text><text class="text" x="260" y="48">VS Code extension for Karel the Robot</text>
    <text class="accent" y="66" xml:space="preserve">  sesamo-whatsapp-bot      </text><text class="text" x="260" y="66">WhatsApp bot</text>
    <text class="accent" y="84" xml:space="preserve">  opencode-agent-flowkit   </text><text class="text" x="260" y="84">CLI tool for OpenCode agent workflows</text>
    <text class="accent" y="102" xml:space="preserve">  n8n-nodes-inalambria     </text><text class="text" x="260" y="102">n8n node for SMS via Inalambria</text>
    <text class="accent" y="120" xml:space="preserve">  Collisions-Simulator     </text><text class="text" x="260" y="120">Elastic collision simulator (Python)</text>
    <text class="accent" y="138" xml:space="preserve">  Py.Karel                 </text><text class="text" x="260" y="138">Karel language interpreter (Python)</text>

    <text class="link" y="172" xml:space="preserve">  Browse all &#8594; https://github.com/GH-Jaider?tab=repositories</text>
  </g>
