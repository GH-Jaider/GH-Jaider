<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340" fill="none">
  <style>
    .bg { fill: #0d1117; }
    .heading { fill: #fbbf24; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; font-weight: 700; }
    .text { fill: #c5cdd9; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .dim { fill: #4b5563; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .link { fill: #60a5fa; font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
  </style>

  <rect class="bg" x="0" y="0" width="800" height="340" rx="8" />

  <g transform="translate(24, 24)">
    <text class="heading" y="0">not-the-louvre</text>
    <text class="dim" y="18">SvelteKit &#183; Supabase &#183; Canvas API &#183; Threlte</text>
    <text class="text" y="38" xml:space="preserve">  Social drawing game built for a hackathon.</text>
    <text class="text" y="56" xml:space="preserve">  Real-time drawing, publishing, forking &amp; voting.</text>
    <text class="link" y="74" xml:space="preserve">  &#8594; https://github.com/Oktuvida/not-the-louvre</text>

    <text class="heading" y="108">splitify</text>
    <text class="dim" y="126">TypeScript &#183; VS Code &#183; Git &#183; GitHub</text>
    <text class="text" y="146" xml:space="preserve">  AI-powered commit grouping for VS Code.</text>
    <text class="text" y="164" xml:space="preserve">  Turn messy changes into clean, atomic commits.</text>
    <text class="link" y="182" xml:space="preserve">  &#8594; https://github.com/GH-Jaider/splitify</text>

    <text class="heading" y="216">VS-Karel</text>
    <text class="dim" y="234">TypeScript &#183; VS Code &#183; Canvas</text>
    <text class="text" y="254" xml:space="preserve">  Interactive visualizer for Karel the Robot.</text>
    <text class="text" y="272" xml:space="preserve">  Step-by-step execution &amp; real-time diagnostics.</text>
    <text class="link" y="290" xml:space="preserve">  &#8594; https://github.com/GH-Jaider/VS-Karel</text>
  </g>
</svg>